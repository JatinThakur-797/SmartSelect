spring.application.name=SmartSelectBackend
# ??? SERVER ?????????????????????????????????????????????
server.port=${PORT:8080}



# ??? DATASOURCE (POSTGRESQL) ???????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_select?useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Jatin@999}

# ??? JPA / HIBERNATE ???????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ??? JACKSON ???????????????????????????????????????????
spring.jackson.default-property-inclusion=non_null


# ??? APPLICATION CONFIG ?????????????????????????????????
app.jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckp3dEF1dGhlbnRpY2F0aW9uU21hcnRCdXlBSQ==}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

#app.gemini.api-key=${GEMINI_API_KEY:your_gemini_api_key_here}
